name: Test Insurance Service
run-name: ${{ github.actor }} triggered test ${{ github.ref_name }} (${{ github.event.pull_request.base.ref }})

on:
  pull_request:
    branches:
      - staging
      - main

concurrency:
  group: ${{ github.workflow }}/${{ github.head_ref || github.ref_name || github.ref }}
  cancel-in-progress: true


jobs:
  notification-start:
    name:  Notification
    runs-on: ubuntu-latest
    steps:
      - name: Notification
        run: echo "Notification important when pipeline is started"

  sonar-analysis:
    name: Sonar analysis
    runs-on: ubuntu-latest
    steps:
      - name: perform static analysis
        run: echo "Perform static analysis"

  detect-changes:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    outputs:
      insurance: ${{ steps.filter.outputs.insurance }}
      vehicle: ${{ steps.filter.outputs.vehicle }}
    needs:
      - notification-start
      - sonar-analysis
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            insurance:
              - 'threadpilot-insurance/**'
            vehicle:
              - 'threadpilot-vehicle/**'

  insurance-build:
    needs:
      - detect-changes
    if:  ${{ needs.detect-changes.outputs.insurance == 'true' }}
    uses: ./.github/workflows/gradle.yml
    with:
      project_name: threadpilot-insurance
      java_version: "21"

  vehicle-build:
    needs:
      - detect-changes
    if:  ${{ needs.detect-changes.outputs.vehicle == 'true' }}
    uses: ./.github/workflows/gradle.yml
    with:
      project_name: threadpilot-vehicle
      java_version: "21"

  insurance-deploy:
    name: Insurance-deploy
    runs-on: ubuntu-latest
    needs:
      - insurance-build
    steps:
      - name: deploy
        run: echo "Deploy insurance service"

  vehicle-deploy:
    name: Vehicle-deploy
    runs-on: ubuntu-latest
    needs:
      - vehicle-build
    steps:
      - name: deploy
        run: echo "Deploy vehicle service"

  notification-end:
    name: Notification
    runs-on: ubuntu-latest
    needs:
      - insurance-deploy
      - vehicle-deploy
    steps:
      - name: Notification
        run: echo "Notification important when pipeline is finished"

